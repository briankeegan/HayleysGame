<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>The Clubhouse</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="icons/icon-192.png" type="image/png" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #faf8ef;
    }
    body { display: flex; flex-direction: column; height: 100svh; }

    .club-header {
      flex: 0 0 auto;
      padding: max(10px, env(safe-area-inset-top)) 80px 12px;
      background: #2f3b52;
      color: #fff;
      text-align: center;
    }
    .club-header { position: relative; }
    .club-header h1 { margin: 0; font-size: 1.15rem; }
    .club-header .sub { font-size: 0.72rem; opacity: 0.75; margin-top: 2px; }
    .club-header .version { font-size: 0.62rem; opacity: 0.45; margin-top: 3px; }
    .game-btn {
      position: absolute;
      left: 12px;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255, 255, 255, 0.12);
      color: #fff;
      text-decoration: none;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 7px 12px;
      border-radius: 8px;
    }
    .logout-wrap {
      position: absolute;
      right: 12px;
      top: 50%;
      transform: translateY(-50%);
    }
    .logout-btn {
      background: rgba(255, 255, 255, 0.12);
      border: none;
      color: #fff;
      font-size: 0.75rem;
      font-weight: 700;
      padding: 7px 12px;
      border-radius: 8px;
      cursor: pointer;
    }
    .logout-confirm {
      position: absolute;
      top: calc(100% + 8px);
      right: 0;
      background: #fff;
      color: #2f3b52;
      border-radius: 10px;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.3);
      padding: 10px 12px;
      min-width: 140px;
      z-index: 20;
    }
    .logout-confirm[hidden] { display: none; }
    .logout-confirm-text {
      font-size: 0.8rem;
      font-weight: 700;
      text-align: center;
      margin-bottom: 8px;
    }
    .logout-confirm-actions { display: flex; gap: 8px; }
    .logout-confirm-actions button {
      flex: 1 1 auto;
      border: none;
      border-radius: 7px;
      padding: 7px 0;
      font-weight: 700;
      font-size: 0.8rem;
      cursor: pointer;
    }
    #logoutYesBtn { background: #ef5350; color: #fff; }
    #logoutNoBtn { background: #eee4da; color: #2f3b52; }
    .secret-field { position: relative; margin: 0 0 12px; }
    .secret-field input { margin: 0; padding-right: 44px; }
    .secret-field button {
      position: absolute;
      right: 6px;
      top: 50%;
      transform: translateY(-50%);
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border: none;
      background: transparent;
      color: #9a8f85;
      cursor: pointer;
      padding: 0;
    }
    .secret-field button svg { width: 20px; height: 20px; }
    .secret-field button svg[hidden] { display: none; }

    /* ---- entry gate ---- */
    .gate {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .gate-panel {
      background: #bbada0;
      border-radius: 14px;
      padding: 26px 22px;
      width: 100%;
      max-width: 360px;
      text-align: center;
      box-shadow: 0 6px 16px rgba(0, 0, 0, 0.15);
    }
    .gate-panel h2 { margin: 0 0 4px; color: #fff; font-size: 1.2rem; }
    .gate-panel p { margin: 0 0 18px; color: rgba(255, 255, 255, 0.85); font-size: 0.85rem; }
    .gate-panel input {
      display: block;
      width: 100%;
      margin: 0 0 12px;
      padding: 12px 14px;
      border: none;
      border-radius: 9px;
      font-size: 1rem;
      background: #faf8ef;
      color: #2f3b52;
    }
    .gate-panel > button {
      width: 100%;
      background: #f2b179;
      border: none;
      color: #3a2a1a;
      font-weight: 700;
      font-size: 1rem;
      padding: 12px;
      border-radius: 9px;
      cursor: pointer;
    }
    .gate-error {
      margin-top: 12px;
      color: #fff;
      background: #ef5350;
      border-radius: 8px;
      padding: 8px 10px;
      font-size: 0.85rem;
      display: none;
    }
    .gate-error.visible { display: block; }

    /* ---- thread ---- */
    .thread-wrap { flex: 1 1 auto; min-height: 0; display: none; flex-direction: column; }
    .thread-wrap.visible { display: flex; }
    .thread {
      flex: 1 1 auto;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 16px 12px 8px;
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
    }
    .bubble {
      max-width: 82%;
      margin: 0 0 10px;
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.95rem;
      line-height: 1.45;
      white-space: pre-wrap;
      overflow-wrap: break-word;
    }
    .bubble .who { display: block; font-size: 0.68rem; font-weight: 700; opacity: 0.7; margin-bottom: 2px; }
    .bubble.visitor {
      margin-left: auto;
      background: #f2b179;
      color: #3a2a1a;
      border-bottom-right-radius: 4px;
    }
    .bubble.claude {
      margin-right: auto;
      background: #2f3b52;
      color: #fff;
      border-bottom-left-radius: 4px;
    }
    .bubble.pending { opacity: 0.65; }
    .thinking {
      display: none;
      margin: 0 0 10px;
      color: #776e65;
      font-size: 0.85rem;
      font-style: italic;
    }
    .thinking.visible { display: block; }
    .thread-status { text-align: center; color: #bbada0; font-size: 0.75rem; padding: 4px 0 8px; }

    .send-error {
      display: flex;
      align-items: center;
      gap: 8px;
      background: #ef5350;
      color: #fff;
      font-size: 0.8rem;
      line-height: 1.4;
      padding: 10px 12px;
      max-width: 640px;
      width: calc(100% - 24px);
      margin: 0 auto 6px;
      border-radius: 10px;
    }
    .send-error[hidden] { display: none; }
    .send-error-text {
      flex: 1 1 auto;
      overflow-wrap: break-word;
      min-width: 0;
      user-select: text;
      -webkit-user-select: text;
    }
    .send-error button {
      flex: 0 0 auto;
      border: none;
      border-radius: 7px;
      background: rgba(255, 255, 255, 0.2);
      color: #fff;
      font-weight: 700;
      font-size: 0.8rem;
      padding: 7px 10px;
      cursor: pointer;
    }

    /* ---- composer ---- */
    .composer {
      flex: 0 0 auto;
      display: flex;
      gap: 8px;
      padding: 10px 12px max(10px, env(safe-area-inset-bottom));
      background: #eee4da;
      max-width: 640px;
      width: 100%;
      margin: 0 auto;
    }
    .composer textarea {
      flex: 1 1 auto;
      resize: none;
      border: none;
      border-radius: 12px;
      padding: 10px 14px;
      font-size: 1rem;
      font-family: inherit;
      background: #fff;
      color: #2f3b52;
      min-height: 44px;
      max-height: 120px;
    }
    .composer button {
      flex: 0 0 auto;
      background: #2f3b52;
      color: #fff;
      border: none;
      font-weight: 700;
      font-size: 0.95rem;
      padding: 0 20px;
      border-radius: 12px;
      cursor: pointer;
    }
    .composer button:disabled { opacity: 0.5; }
  </style>
</head>
<body>
  <header class="club-header">
    <a class="game-btn" href="./">🎮 Game</a>
    <div class="logout-wrap">
      <button class="logout-btn" id="logoutBtn" hidden>Log out</button>
      <div class="logout-confirm" id="logoutConfirm" hidden>
        <div class="logout-confirm-text">Log out?</div>
        <div class="logout-confirm-actions">
          <button id="logoutYesBtn">Yes</button>
          <button id="logoutNoBtn">No</button>
        </div>
      </div>
    </div>
    <h1>🏰 The Clubhouse</h1>
    <div class="sub">a secret place to talk about Hayley's Game</div>
    <div class="version" id="versionStamp"></div>
  </header>

  <div class="gate" id="gate">
    <div class="gate-panel">
      <h2>Who goes there?</h2>
      <p>Sign your name and whisper the secret word.</p>
      <input id="nameInput" type="text" placeholder="Your name" autocomplete="off" maxlength="40" />
      <div class="secret-field">
        <input id="secretInput" type="password" placeholder="Secret word" autocomplete="off" maxlength="60" />
        <button id="peekBtn" type="button" aria-label="Show secret word">
          <svg id="eyeOpen" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M1 12s4-7 11-7 11 7 11 7-4 7-11 7S1 12 1 12z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
          <svg id="eyeClosed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" hidden>
            <path d="M17.94 17.94A10.94 10.94 0 0 1 12 19c-7 0-11-7-11-7a20.66 20.66 0 0 1 5.06-5.94"/>
            <path d="M9.9 4.24A10.94 10.94 0 0 1 12 5c7 0 11 7 11 7a20.8 20.8 0 0 1-3.22 4.19"/>
            <path d="M14.12 14.12a3 3 0 1 1-4.24-4.24"/>
            <line x1="1" y1="1" x2="23" y2="23"/>
          </svg>
        </button>
      </div>
      <button id="enterBtn">Enter the clubhouse</button>
      <div class="gate-error" id="gateError"></div>
    </div>
  </div>

  <div class="thread-wrap" id="threadWrap">
    <div class="thread" id="thread">
      <div class="thread-status" id="threadStatus">opening the clubhouse door…</div>
    </div>
    <div class="send-error" id="sendError" hidden>
      <div class="send-error-text" id="sendErrorText"></div>
      <button id="copyErrorBtn" type="button">Copy</button>
      <button id="dismissErrorBtn" type="button" aria-label="Dismiss">&times;</button>
    </div>
    <div class="composer">
      <textarea id="messageInput" placeholder="Write your ideas here…" maxlength="3900"></textarea>
      <button id="sendBtn">Send</button>
    </div>
  </div>

  <script src="version.js"></script>
  <script>
    // window.APP_VERSION comes from version.js, stamped fresh by the deploy
    // workflow on every run (404s harmlessly in local dev, where the file
    // doesn't exist).
    document.getElementById("versionStamp").textContent = window.APP_VERSION || "";

    // Wired to the standing "Clubhouse" PR whose comments are the thread.
    var REPO = "briankeegan/HayleysGame";
    var PR_NUMBER = 33;
    // The relay that checks the secret word and posts messages.
    var WORKER_URL = "https://sdsgame.bramp-games.workers.dev";

    var gateEl = document.getElementById("gate");
    var gateErrorEl = document.getElementById("gateError");
    var nameInput = document.getElementById("nameInput");
    var secretInput = document.getElementById("secretInput");
    var enterBtn = document.getElementById("enterBtn");
    var threadWrapEl = document.getElementById("threadWrap");
    var threadEl = document.getElementById("thread");
    var threadStatusEl = document.getElementById("threadStatus");
    var messageInput = document.getElementById("messageInput");
    var sendBtn = document.getElementById("sendBtn");

    var visitorName = "";
    var secretWord = "";
    var pollTimer = null;
    var fastPollUntil = 0;
    var lastRenderKey = "";

    function showGateError(msg) {
      gateErrorEl.textContent = msg;
      gateErrorEl.classList.add("visible");
    }

    function relay(payload) {
      return fetch(WORKER_URL, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify(payload),
      });
    }

    var LOGIN_KEY = "clubhouse_login";
    var logoutBtn = document.getElementById("logoutBtn");
    var peekBtn = document.getElementById("peekBtn");

    var eyeOpen = document.getElementById("eyeOpen");
    var eyeClosed = document.getElementById("eyeClosed");

    // SVG elements don't support the .hidden property — toggle the attribute.
    function setPeekIcons(showing) {
      if (showing) {
        eyeOpen.setAttribute("hidden", "");
        eyeClosed.removeAttribute("hidden");
      } else {
        eyeClosed.setAttribute("hidden", "");
        eyeOpen.removeAttribute("hidden");
      }
      peekBtn.setAttribute("aria-label", showing ? "Hide secret word" : "Show secret word");
    }

    peekBtn.addEventListener("click", function () {
      var show = secretInput.type === "password";
      secretInput.type = show ? "text" : "password";
      setPeekIcons(show);
    });

    function openClubhouse(name, secret) {
      visitorName = name;
      secretWord = secret;
      try {
        localStorage.setItem(LOGIN_KEY, JSON.stringify({ name: name, secret: secret }));
      } catch (e) {}
      gateEl.style.display = "none";
      threadWrapEl.classList.add("visible");
      logoutBtn.hidden = false;
      startPolling();
    }

    function enterClubhouse(name, secret, fromSavedLogin) {
      enterBtn.disabled = true;
      enterBtn.textContent = "Checking…";
      relay({ action: "verify", secret: secret })
        .then(function (res) {
          if (res.status === 403) throw new Error("wrong-secret");
          if (!res.ok) throw new Error("relay");
          openClubhouse(name, secret);
        })
        .catch(function (err) {
          if (fromSavedLogin) {
            // A remembered login that stopped working (changed password,
            // offline) falls back to the gate without an alarming error.
            if (err.message === "wrong-secret") {
              try { localStorage.removeItem(LOGIN_KEY); } catch (e) {}
            }
            nameInput.value = name;
            return;
          }
          showGateError(
            err.message === "wrong-secret"
              ? "That's not the secret word. Try again!"
              : "Couldn't reach the clubhouse. Check your internet and try again."
          );
        })
        .finally(function () {
          enterBtn.disabled = false;
          enterBtn.textContent = "Enter the clubhouse";
        });
    }

    enterBtn.addEventListener("click", function () {
      var name = nameInput.value.trim();
      var secret = secretInput.value.trim();
      gateErrorEl.classList.remove("visible");
      if (!name) return showGateError("You have to sign your name!");
      if (!secret) return showGateError("You have to whisper the secret word!");
      if (!WORKER_URL) return showGateError("The clubhouse isn't wired up yet — come back soon.");
      enterClubhouse(name, secret, false);
    });

    var logoutConfirmEl = document.getElementById("logoutConfirm");
    var logoutYesBtn = document.getElementById("logoutYesBtn");
    var logoutNoBtn = document.getElementById("logoutNoBtn");

    function doLogout() {
      try { localStorage.removeItem(LOGIN_KEY); } catch (e) {}
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = null;
      visitorName = "";
      secretWord = "";
      logoutBtn.hidden = true;
      threadWrapEl.classList.remove("visible");
      gateEl.style.display = "flex";
      nameInput.value = "";
      secretInput.value = "";
      secretInput.type = "password";
      setPeekIcons(false);
    }

    // Logging out clears the remembered secret, so a stray tap shouldn't be
    // able to do it by itself — the button just opens a Yes/No confirm.
    logoutBtn.addEventListener("click", function () {
      logoutConfirmEl.hidden = false;
    });
    logoutYesBtn.addEventListener("click", function () {
      logoutConfirmEl.hidden = true;
      doLogout();
    });
    logoutNoBtn.addEventListener("click", function () {
      logoutConfirmEl.hidden = true;
    });
    document.addEventListener("click", function (e) {
      if (logoutConfirmEl.hidden) return;
      if (e.target === logoutBtn || logoutConfirmEl.contains(e.target)) return;
      logoutConfirmEl.hidden = true;
    });

    // Walk straight in if this device already knows the secret handshake.
    (function () {
      var saved = null;
      try { saved = JSON.parse(localStorage.getItem(LOGIN_KEY)); } catch (e) {}
      if (saved && saved.name && saved.secret && WORKER_URL) {
        enterClubhouse(saved.name, saved.secret, true);
      }
    })();

    // Comments are chat messages only if they start with "**<name> says:**".
    // Claude's replies use the name Claude; everything else renders as a
    // visitor bubble. Unmarked comments (PR housekeeping) are skipped.
    var MARKER = /^\*\*(.+?) says:\*\*\s*/;

    function parseComments(comments) {
      var messages = [];
      for (var i = 0; i < comments.length; i++) {
        var m = comments[i].body.match(MARKER);
        if (!m) continue;
        var text = comments[i].body.slice(m[0].length);
        // Messages may end with a deploy-version stamp like [v0.57] — pull it
        // out of the text and show it in the byline instead.
        var version = null;
        var vm = text.match(/\s*\[(v[\d.]+)\]\s*$/);
        if (vm) {
          version = vm[1];
          text = text.slice(0, vm.index);
        }
        messages.push({
          who: m[1],
          fromClaude: m[1].toLowerCase() === "claude",
          text: text,
          version: version,
          when: comments[i].created_at,
        });
      }
      return messages;
    }

    function friendlyTime(iso) {
      var d = new Date(iso);
      return d.toLocaleDateString(undefined, { month: "short", day: "numeric" }) +
        " " + d.toLocaleTimeString(undefined, { hour: "numeric", minute: "2-digit" });
    }

    function renderMessages(messages) {
      var key = JSON.stringify(messages.map(function (m) { return [m.who, m.when]; }));
      if (key === lastRenderKey) return;
      lastRenderKey = key;

      threadEl.innerHTML = "";
      if (messages.length === 0) {
        var empty = document.createElement("div");
        empty.className = "thread-status";
        empty.textContent = "No messages yet — you get to write the very first one!";
        threadEl.appendChild(empty);
      }
      for (var i = 0; i < messages.length; i++) {
        var msg = messages[i];
        var bubble = document.createElement("div");
        bubble.className = "bubble " + (msg.fromClaude ? "claude" : "visitor");
        var who = document.createElement("span");
        who.className = "who";
        who.textContent =
          msg.who + (msg.version ? " · " + msg.version : "") + " · " + friendlyTime(msg.when);
        bubble.appendChild(who);
        bubble.appendChild(document.createTextNode(msg.text));
        threadEl.appendChild(bubble);
      }

      var thinking = document.createElement("div");
      thinking.className = "thinking";
      thinking.id = "thinkingNote";
      thinking.textContent = "Claude is thinking… replies can take a little while.";
      threadEl.appendChild(thinking);
      if (messages.length && !messages[messages.length - 1].fromClaude) {
        thinking.classList.add("visible");
      }

      threadEl.scrollTop = threadEl.scrollHeight;
    }

    function fetchThread() {
      var url = "https://api.github.com/repos/" + REPO + "/issues/" + PR_NUMBER +
        "/comments?per_page=100&sort=created&direction=asc";
      var all = [];
      function fetchPage(pageUrl) {
        return fetch(pageUrl, { headers: { Accept: "application/vnd.github+json" } })
          .then(function (res) {
            if (!res.ok) throw new Error("github");
            var next = null;
            var link = res.headers.get("Link") || "";
            var m = link.match(/<([^>]+)>;\s*rel="next"/);
            if (m) next = m[1];
            return res.json().then(function (page) {
              all = all.concat(page);
              return next ? fetchPage(next) : all;
            });
          });
      }
      return fetchPage(url);
    }

    function refreshThread() {
      fetchThread()
        .then(function (comments) {
          threadStatusEl.style.display = "none";
          renderMessages(parseComments(comments));
        })
        .catch(function () {
          threadStatusEl.style.display = "block";
          threadStatusEl.textContent = "Having trouble reaching the clubhouse — retrying…";
        });
    }

    function startPolling() {
      refreshThread();
      if (pollTimer) clearInterval(pollTimer);
      pollTimer = setInterval(function () {
        // Poll faster for a while after sending, waiting for Claude's reply.
        var interval = Date.now() < fastPollUntil ? 15000 : 45000;
        if (Date.now() - lastPoll >= interval) {
          lastPoll = Date.now();
          refreshThread();
        }
      }, 5000);
      lastPoll = Date.now();
    }
    var lastPoll = 0;

    sendBtn.addEventListener("click", function () {
      var text = messageInput.value.trim();
      if (!text) return;
      // Stamp the message with the deploy version this page was sent from,
      // so the thread records who was on what version when.
      var stamped = window.APP_VERSION ? text + "\n\n[" + window.APP_VERSION + "]" : text;
      sendBtn.disabled = true;
      sendBtn.textContent = "Sending…";
      relay({ action: "post", name: visitorName, secret: secretWord, message: stamped })
        .then(function (res) {
          return res
            .json()
            .catch(function () { return {}; })
            .then(function (data) { return { res: res, data: data }; });
        })
        .then(function (r) {
          if (r.res.status === 403) throw new Error("wrong-secret");
          if (!r.res.ok) throw new Error(r.data.error || "relay error " + r.res.status);
          messageInput.value = "";
          messageInput.style.height = "auto";
          sendErrorEl.hidden = true;
          // Show it immediately; the next refresh replaces it with the real one.
          lastRenderKey = "";
          var bubble = document.createElement("div");
          bubble.className = "bubble visitor pending";
          var who = document.createElement("span");
          who.className = "who";
          who.textContent = visitorName + " · just now";
          bubble.appendChild(who);
          bubble.appendChild(document.createTextNode(text));
          var thinkingNote = document.getElementById("thinkingNote");
          threadEl.insertBefore(bubble, thinkingNote);
          thinkingNote.classList.add("visible");
          threadEl.scrollTop = threadEl.scrollHeight;
          fastPollUntil = Date.now() + 10 * 60 * 1000;
        })
        .catch(function (err) {
          showSendError(
            err.message === "wrong-secret"
              ? "The secret word stopped working — reload the page and try again."
              : "Message didn't go through. Relay said: " + err.message
          );
        })
        .finally(function () {
          sendBtn.disabled = false;
          sendBtn.textContent = "Send";
        });
    });

    var sendErrorEl = document.getElementById("sendError");
    var sendErrorTextEl = document.getElementById("sendErrorText");
    var copyErrorBtn = document.getElementById("copyErrorBtn");
    var dismissErrorBtn = document.getElementById("dismissErrorBtn");

    function showSendError(msg) {
      sendErrorTextEl.textContent = msg;
      sendErrorEl.hidden = false;
      copyErrorBtn.textContent = "Copy";
    }

    copyErrorBtn.addEventListener("click", function () {
      var text = sendErrorTextEl.textContent;
      var done = function () { copyErrorBtn.textContent = "Copied!"; };
      if (navigator.clipboard && navigator.clipboard.writeText) {
        navigator.clipboard.writeText(text).then(done, function () { fallbackCopy(text, done); });
      } else {
        fallbackCopy(text, done);
      }
    });

    function fallbackCopy(text, done) {
      var ta = document.createElement("textarea");
      ta.value = text;
      ta.style.position = "fixed";
      ta.style.opacity = "0";
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand("copy"); done(); } catch (e) {}
      ta.remove();
    }

    dismissErrorBtn.addEventListener("click", function () {
      sendErrorEl.hidden = true;
    });

    // Enter makes a new line (multi-line messages welcome); only the Send
    // button sends. The box grows with the message up to its max height.
    messageInput.addEventListener("input", function () {
      messageInput.style.height = "auto";
      messageInput.style.height = Math.min(messageInput.scrollHeight, 120) + "px";
    });
  </script>
</body>
